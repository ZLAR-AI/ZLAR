# ═══════════════════════════════════════════════════════════════════════════════
# ZLAR-OC Log Rotation (macOS newsyslog)
# (#13 Lysosomes — cellular waste disposal)
#
# Install:  sudo cp etc/zlar-oc/newsyslog.d/zlar-oc.conf /etc/newsyslog.d/
# Verify:   sudo newsyslog -vn  (dry-run, shows what would rotate)
# Manual:   sudo newsyslog -F   (force rotation now)
#
# Fields: logfile  owner:group  mode  count  size(KB)  when  flags  pidfile  signal
# ═══════════════════════════════════════════════════════════════════════════════

# Audit trail — most important, keep 90 days of compressed history
# Rotates at 50MB or weekly, whichever comes first
/var/log/zlar-oc/audit.jsonl		admin:wheel	640	90	51200	$W0	GJN

# Gate daemon log — operational, keep 30 days
/var/log/zlar-oc/gate.log		admin:wheel	640	30	10240	$W0	GJN	/var/run/zlar-oc-gate.pid	1

# Watchdog log — keep 30 days
/var/log/zlar-oc/watchdog.log		admin:wheel	640	30	10240	$W0	GJN

# OpenClaw stderr — can be verbose, keep 14 days
/var/log/zlar-oc/openclaw-stderr.log	admin:wheel	640	14	51200	$D0	GJN

# OpenClaw stdout — keep 14 days
/var/log/zlar-oc/openclaw-stdout.log	admin:wheel	640	14	51200	$D0	GJN
