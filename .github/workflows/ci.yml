name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: ShellCheck bin/
        run: shellcheck --severity=error bin/*

      - name: ShellCheck adapters/
        run: shellcheck --severity=error adapters/*/hook.sh

      - name: ShellCheck scripts/
        run: shellcheck --severity=error scripts/*.sh

      - name: ShellCheck install/uninstall
        run: shellcheck --severity=error install.sh uninstall.sh

      - name: ShellCheck lib/
        run: shellcheck --severity=error lib/*.sh

      - name: ShellCheck tests/
        run: shellcheck --severity=error tests/*.sh

      - name: ShellCheck oc/bin/
        run: shellcheck --severity=error oc/bin/*

      - name: Validate JSON configs
        run: |
          for f in etc/*.json etc/policies/*.json oc/etc/zlar-oc/*.json oc/etc/zlar-oc/policies/*.json; do
            if [ -f "$f" ]; then
              python3 -m json.tool "$f" > /dev/null || { echo "FAIL: $f"; exit 1; }
              echo "OK: $f"
            fi
          done

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Run witness tests
        run: bash tests/test-witness.sh
