name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: ShellCheck bin/
        run: shellcheck --severity=error bin/*

      - name: ShellCheck adapters/
        run: shellcheck --severity=error adapters/*/hook.sh

      - name: ShellCheck scripts/
        run: shellcheck --severity=error scripts/*.sh scripts/zlar-tg-poll

      - name: ShellCheck install/uninstall
        run: shellcheck --severity=error install.sh uninstall.sh

      - name: ShellCheck lib/
        run: shellcheck --severity=error lib/*.sh

      - name: ShellCheck tests/
        run: shellcheck --severity=error tests/*.sh

      - name: ShellCheck oc/bin/
        run: shellcheck --severity=error oc/bin/*

      - name: Validate JSON configs
        run: |
          for f in etc/*.json etc/policies/*.json oc/etc/zlar-oc/*.json oc/etc/zlar-oc/policies/*.json; do
            if [ -f "$f" ]; then
              python3 -m json.tool "$f" > /dev/null || { echo "FAIL: $f"; exit 1; }
              echo "OK: $f"
            fi
          done

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install dependencies
        run: sudo apt-get install -y jq openssl

      - name: Run witness tests
        run: bash tests/test-witness.sh

      - name: Run inbox HMAC tests
        run: bash tests/test-inbox-hmac.sh

      - name: Run crypto abstraction tests
        run: bash tests/test-crypto.sh

      - name: Run session state tests
        run: bash tests/test-session-state.sh

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'

      - name: Install Cedar dependencies
        run: cd cedar-poc && npm ci

      - name: Run Cedar base tests
        run: node cedar-poc/test.mjs

      - name: Run Cedar E-23 tests
        run: node cedar-poc/test-e23.mjs

      - name: Run MCP gate tests
        run: node mcp-gate/test.mjs
