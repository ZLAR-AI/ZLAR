name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: ShellCheck bin/
        run: |
          file bin/* | grep 'shell script' | cut -d: -f1 | xargs shellcheck --severity=error

      - name: ShellCheck adapters/
        run: shellcheck --severity=error adapters/*/hook.sh

      - name: ShellCheck scripts/
        run: shellcheck --severity=error scripts/*.sh scripts/zlar-tg-poll

      - name: ShellCheck install/uninstall
        run: shellcheck --severity=error install.sh uninstall.sh

      - name: ShellCheck lib/
        run: shellcheck --severity=error lib/*.sh

      - name: ShellCheck tests/
        run: shellcheck --severity=error tests/*.sh

      - name: ShellCheck oc/bin/
        run: shellcheck --severity=error oc/bin/*

      - name: Validate JSON configs
        run: |
          for f in etc/*.json etc/policies/*.json oc/etc/zlar-oc/*.json oc/etc/zlar-oc/policies/*.json; do
            if [ -f "$f" ]; then
              python3 -m json.tool "$f" > /dev/null || { echo "FAIL: $f"; exit 1; }
              echo "OK: $f"
            fi
          done

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y jq openssl

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install jq openssl@3
          echo "/opt/homebrew/opt/openssl@3/bin" >> $GITHUB_PATH

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'

      - name: Install Cedar dependencies
        run: cd cedar-poc && npm ci

      - name: Create CI signing key (Phase 2 SDK chain signing)
        run: |
          openssl genpkey -algorithm ed25519 -out ~/.zlar-signing.key
          chmod 600 ~/.zlar-signing.key

      - name: Setup CI test fixtures
        run: |
          # Tests that read etc/policies/active.policy.json need it to exist
          # in the fresh checkout. install.sh creates it locally; CI must
          # replicate. Use the full v2.x default (72 rules), not the
          # long-tail variant (lt-default) which has only 26 rules and
          # v1.0.0 — that mismatch trips test-perimeter-closure's
          # expected-version check.
          cp etc/policies/default.policy.example.json etc/policies/active.policy.json

          # test-agent-identity.sh runs zlar-agents-export which reads the
          # audit log and asserts properties of the discovered agents. CI
          # has no audit log; create a minimal fixture with one production
          # agent and one test agent so the production-view filtering test
          # has data to work against.
          mkdir -p var/log
          cat > var/log/audit.jsonl <<'EOF'
          {"id":"ci-fixture-1","ts":"2026-04-01T00:00:00Z","seq":1,"source":"gate","host":"ci","user":"ci","agent_id":"claude-code","session_id":"ci-session-1","domain":"bash","action":"echo ci","outcome":"allow","risk_score":0,"detail":{"command":"echo ci","cwd":"/tmp"},"rule":"R001","policy_version":"2.7.2","severity":"info","prev_hash":"genesis","authorizer":"policy","signature_algorithm":"Ed25519","hash_algorithm":"SHA-256","public_key_id":"ci-fixture","signature":"unsigned"}
          {"id":"ci-fixture-2","ts":"2026-04-01T00:00:01Z","seq":2,"source":"gate","host":"ci","user":"ci","agent_id":"test-agent","session_id":"ci-session-2","domain":"bash","action":"echo test","outcome":"allow","risk_score":0,"detail":{"command":"echo test","cwd":"/tmp"},"rule":"R001","policy_version":"2.7.2","severity":"info","prev_hash":"ci-fixture-1-hash","authorizer":"policy","signature_algorithm":"Ed25519","hash_algorithm":"SHA-256","public_key_id":"ci-fixture","signature":"unsigned"}
          EOF

      - name: Run full test suite (count-assertions.sh)
        # ZLAR_SKIP_TESTS marks specific tests as SKIP rather than FAIL.
        # These tests have CI-environment-specific issues that pass on
        # local development machines but fail in fresh GitHub Actions
        # runners. Each one is a v2.8 work item:
        #
        #   test-canary.sh — assertion 25 ("pending file cleaned up")
        #     uses `touch -t 202501010000` to create a stale file then
        #     expects canary_check_result to clean it up. The cleanup
        #     logic behaves differently across bash + filesystem combos.
        #
        #   test-manifest.sh — sign/verify assertions need a signed live
        #     policy with a matching public key. Adding both to CI breaks
        #     test-policy-loading.sh, which tries to load the live policy
        #     and fails when the signing chain doesn't match its own
        #     fixture key. Mutually exclusive without test refactoring.
        #
        #   test-perimeter-closure.sh on Linux — Phase C (Seatbelt sandbox)
        #     tests need macOS sandbox-exec. The test has a skip for the
        #     missing-binary case but other assertions still fail in the
        #     Ubuntu environment. Passes cleanly on macOS CI.
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            export ZLAR_SKIP_TESTS="test-canary.sh:test-manifest.sh:test-perimeter-closure.sh"
          else
            export ZLAR_SKIP_TESTS="test-canary.sh:test-manifest.sh"
          fi
          bash tests/count-assertions.sh --detail

      - name: Verify assertion threshold
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            export ZLAR_SKIP_TESTS="test-canary.sh:test-manifest.sh:test-perimeter-closure.sh"
            THRESHOLD=700
          else
            export ZLAR_SKIP_TESTS="test-canary.sh:test-manifest.sh"
            THRESHOLD=800
          fi
          COUNT=$(bash tests/count-assertions.sh 2>&1 | grep -oE "Assertions: [0-9]+" | grep -oE "[0-9]+")
          echo "Total assertions: $COUNT (threshold: $THRESHOLD)"
          if [ "$COUNT" -lt "$THRESHOLD" ]; then
            echo "FAIL: assertion count $COUNT below threshold $THRESHOLD"
            exit 1
          fi

  proof:
    name: Proof of Enforcement
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install dependencies
        run: sudo apt-get install -y jq openssl

      - name: Run proof of enforcement simulation
        run: bash demos/proof-of-enforcement.sh
